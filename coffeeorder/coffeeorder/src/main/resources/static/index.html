<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Coffee Shop</title>
    <h1 >COFFEE</h1>
</head>
<style>
    body{
        margin:0;
        height:100vh;

        background-image:url('https://png.pngtree.com/png-clipart/20240810/original/pngtree-flying-cup-of-coffee-with-splash-and-png-image_15739217.png');
        background-size:cover;
        background-position:center;
        background-repeat:no-repeat;

        display:flex;
        justify-content:center;
        align-items:center;

        font-family:Arial,sans-serif;
    }

    .container{
        width:450px;

        background:rgba(255,255,255,0.9);

        padding:30px;

        border-radius:15px;

        text-align:center;

        box-shadow:0 4px 15px rgba(0,0,0,0.3);
    }

    h1{
        color:brown;
        margin-bottom:20px;
    }

    label{
        display:block;
        font-size:18px;
        font-weight:bold;
        margin-bottom:10px;
    }

    input{
        width:90%;
        padding:12px;

        border:1px solid #ccc;
        border-radius:8px;

        font-size:16px;
    }

    button{
        margin-top:15px;

        width:100%;

        padding:12px;

        background:brown;
        color:white;

        border:none;
        border-radius:8px;

        font-size:18px;
        cursor:pointer;
    }

    button:hover{
        background:darkred;
    }

    h2{
        margin-top:25px;
    }

    ul{
        list-style:none;
        padding:0;
    }

    li{
        background:#f5f5f5;
        margin:8px 0;
        padding:10px;
        border-radius:5px;
    }
</style>
<body>

<form id="coffeeForm">
    Coffee Name:
    <input id="coffeeName">
    <button type="submit">Place Order</button>
</form>

<h2>Coffee Orders</h2>
<ul id="coffeeList"></ul>

<script>

    const form = document.getElementById("coffeeForm");
    const list = document.getElementById("coffeeList");

    // Load all coffee orders when page opens
    fetch("http://localhost:8081/coffee")
        .then(res => res.json())
        .then(data => data.forEach(order => addCoffee(order)));

    // When form is submitted
    form.addEventListener("submit", e => {

        e.preventDefault();

        const coffee =
            document.getElementById("coffeeName").value;

        fetch(`http://localhost:8081/coffee/${coffee}`, {

            method: "POST"

        })
            .then(res => res.text())
            .then(message => {

                console.log(message);

                addCoffee(coffee);

            });

        form.reset();

    });

    function addCoffee(coffee){

        const li = document.createElement("li");

        li.textContent = coffee;

        list.appendChild(li);

    }

</script>

</body>
</html>
