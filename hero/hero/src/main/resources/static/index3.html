<html>
<body>
<script>

    let mypromise = new Promise(
        (resolve, reject) => {

            let success = true;

            if(success == true)
            {
                resolve("Send my ticket");
            }
            else
            {
                reject("Send my money back");
            }

        }

    );
    mypromise

        .then(result => {

            console.log("RESULT: SUCCESS");

            console.log(result);

        })

        .catch(error => {

            console.log("RESULT: ERROR");

            console.log(error);

        });

</script>

</body>
</html>
